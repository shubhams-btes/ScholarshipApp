{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Scholarship Application-BTES</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="{% static 'tests/css/custom.css' %}" rel="stylesheet" />
</head>
<body>


    <div class="exam-layout">

		<!-- LEFT PANEL -->
		<aside class="left-panel">
			<section class="sidebar-content">
				<div class="logo">
					<a href="#"><img src="{% static 'tests/images/logo-white.png' %}" alt="BTES" /></a>
				</div>

				<figure>
					<img src="{% static 'tests/images/Login.png' %}" alt="" />
				</figure>

				<div class="copyright">
					Copyright © BTES. All rights reserved.
				</div>
			</section>

		</aside>

		<!-- RIGHT PANEL -->
		<main class="right-panel">

			<div class="content-area">
                <section class="question-section">

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="post">

                    {% csrf_token %}

                    <h2 class="section-title">
                        Student Login
                    </h2>

                    <div class="divider"></div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input
                            type="email"
                            name="email"
                            required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input
                            type="password"
                            name="password"
                            required>
                    </div>

                    <div class="divider"></div>

                    <div class="actions">

                        <button
                            type="submit"
                            class="btn next">
                            Sign In
                        </button>

                    </div>

                </form>

            </section>
			</div>

		</main>

	</div>

    <script src="{% static 'tests/js/script.js' %}"></script>

</body>
</html>


<script>
  // Auto-hide alerts after 2s
  setTimeout(function() {
    let alerts = document.querySelectorAll('.alert');
    alerts.forEach(function(alert) {
      let bsAlert = new bootstrap.Alert(alert);
      bsAlert.close();
    });
  }, 5000);
</script>
